name: Auto-Publish Blog

on:
  push:
    paths:
      - 'content/**/*.md'
      - 'quartz/**'
      - '.github/workflows/publish.yml'
      - '.gitignore'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify no Drafts in repository
        run: |
          echo "🔒 Security Check: Verifying no Drafts in repository..."
          if git ls-files | grep -E "^Blog/Drafts/"; then
            echo "❌ CRITICAL: Drafts found in git tracking!"
            exit 1
          fi
          echo "✅ PASSED: No Drafts in repository"

      - name: Verify no secrets exposed
        run: |
          echo "🔒 Security Check: Verifying no secrets..."
          if git ls-files | grep -E "\.(env|key|pem)$"; then
            echo "❌ CRITICAL: Secrets found in repository!"
            exit 1
          fi
          echo "✅ PASSED: No secrets in repository"

  publish:
    needs: security-check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Quartz dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml anthropic

      - name: Translate posts to English (Claude API)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          python3 .github/scripts/translate.py || echo "Translation completed or skipped"

      - name: Publish to Dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          python3 .github/scripts/post_devto.py || echo "Dev.to publishing completed or skipped"

      - name: Build Quartz site
        run: npx quartz build

      - name: Verify built site has no Drafts
        run: |
          echo "Verifying built site..."
          if [ -d "public/Blog/Drafts" ]; then
            echo "❌ CRITICAL: Drafts directory found in built site!"
            exit 1
          fi
          if grep -r "Blog/Drafts" public/ --include="*.html" 2>/dev/null; then
            echo "❌ CRITICAL: Drafts references found in published content!"
            exit 1
          fi
          echo "✅ PASSED: Built site is clean"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Update frontmatter with Dev.to links
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          python3 .github/scripts/update_frontmatter.py || echo "Frontmatter update completed or skipped"

      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/posts/ko/ .github/data/ || true
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: update dev.to links in frontmatter" && git push) || true
