  <text x="342" y="287" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="10" fill="#8b5cf6">역난독화</text>

  <!-- RIGHT code block -->
  <rect x="392" y="212" width="258" height="108" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="392" y="212" width="258" height="24" rx="8" fill="#1e293b"/>
  <rect x="392" y="224" width="258" height="12" fill="#1e293b"/>
  <text x="417" y="228" font-family="monospace" font-size="10" fill="#f87171">// 난독화 코드 (After)</text>
  <text x="407" y="250" font-family="'Courier New',monospace" font-size="11" fill="#7dd3fc">function </text>
  <text x="475" y="250" font-family="'Courier New',monospace" font-size="11" fill="#f87171">_0x3b2f</text>
  <text x="523" y="250" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">(</text>
  <text x="529" y="250" font-family="'Courier New',monospace" font-size="11" fill="#fdba74">_0x1a</text>
  <text x="561" y="250" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">,</text>
  <text x="568" y="250" font-family="'Courier New',monospace" font-size="11" fill="#fdba74">_0x2c</text>
  <text x="407" y="266" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">) {</text>
  <text x="422" y="283" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">  return </text>
  <text x="474" y="283" font-family="'Courier New',monospace" font-size="11" fill="#fdba74">_0x1a</text>
  <text x="506" y="283" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0"> * </text>
  <text x="522" y="283" font-family="'Courier New',monospace" font-size="11" fill="#fdba74">_0x2c</text>
  <text x="554" y="283" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0"> * 0x1;</text>
  <text x="407" y="300" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">}</text>
  <text x="407" y="314" font-family="'Courier New',monospace" font-size="10" fill="#f87171">// 의미 파악 불가 → 분석 어려움</text>

  <text x="340" y="345" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="10" fill="#94a3b8">주요 기법</text>

