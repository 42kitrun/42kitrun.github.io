  <text x="340" y="53" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#64748b" letter-spacing="2">Code Obfuscation  ·  Overview</text>

  <rect x="30" y="88" width="620" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="340" y="106" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" font-weight="600" fill="#3b82f6">정 의</text>
  <text x="340" y="122" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="12" fill="#1e40af">소스코드를 읽기 어렵게 변환하되, 실행 동작은 동일하게 유지하는 기법</text>

  <text x="340" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">목 적</text>
  <rect x="88" y="159" width="82" height="22" rx="11" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="129" y="174" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="#166534">IP 보호</text>
  <rect x="182" y="159" width="102" height="22" rx="11" fill="#fef9c3" stroke="#fde047" stroke-width="0.8"/>
  <text x="233" y="174" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="#854d0e">역공학 방지</text>
  <rect x="296" y="159" width="88" height="22" rx="11" fill="#fce7f3" stroke="#f9a8d4" stroke-width="0.8"/>
  <text x="340" y="174" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="#9d174d">코드 보안↑</text>
  <rect x="396" y="159" width="96" height="22" rx="11" fill="#ede9fe" stroke="#c4b5fd" stroke-width="0.8"/>
  <text x="444" y="174" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="#5b21b6">분석 난이도↑</text>
  <rect x="504" y="159" width="88" height="22" rx="11" fill="#f0fdf4" stroke="#86efac" stroke-width="0.8"/>
  <text x="548" y="174" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="#166534">용량 절감</text>

  <text x="340" y="205" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="10" fill="#94a3b8">변환 예시</text>

  <!-- LEFT code block -->
  <rect x="30" y="212" width="258" height="108" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="30" y="212" width="258" height="24" rx="8" fill="#1e293b"/>
  <rect x="30" y="224" width="258" height="12" fill="#1e293b"/>
  <text x="55" y="228" font-family="monospace" font-size="10" fill="#7dd3fc">// 원본 코드 (Before)</text>
  <text x="45" y="250" font-family="'Courier New',monospace" font-size="11" fill="#7dd3fc">function </text>
  <text x="113" y="250" font-family="'Courier New',monospace" font-size="11" fill="#86efac">calculatePrice</text>
  <text x="222" y="250" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">(</text>
  <text x="228" y="250" font-family="'Courier New',monospace" font-size="11" fill="#fdba74">qty</text>
  <text x="247" y="250" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">, </text>
  <text x="260" y="250" font-family="'Courier New',monospace" font-size="11" fill="#fdba74">price</text>
  <text x="45" y="266" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">) {</text>
  <text x="60" y="283" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">  return </text>
  <text x="112" y="283" font-family="'Courier New',monospace" font-size="11" fill="#fdba74">qty </text>
  <text x="135" y="283" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">* </text>
  <text x="147" y="283" font-family="'Courier New',monospace" font-size="11" fill="#fdba74">price</text>
  <text x="183" y="283" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0"> * 1.1;</text>
  <text x="45" y="300" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">}</text>
  <text x="45" y="314" font-family="'Courier New',monospace" font-size="10" fill="#4ade80">// 의미 있는 이름 → 읽기 쉬움</text>

  <!-- BIDIRECTIONAL ARROWS -->
  <line x1="300" y1="256" x2="384" y2="256" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="342" y="249" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="10" fill="#64748b">난독화</text>
